# 数据源配置文件示例
# 支持环境变量引用，格式：${VAR_NAME} 或 ${VAR_NAME:default_value}

data_sources:
  # Oracle 主数据库（复用现有）
  oracle_main:
    type: oracle
    host: 192.168.1.73
    port: 1521
    service_name: ORCL
    user: AIR_SJ_JY
    password: ${ORACLE_PASSWORD}  # 从环境变量读取
    pool_min: 2
    pool_max: 10
    timeout: 30
    default: true
  
  # PostgreSQL 报表数据库
  postgres_report:
    type: postgresql
    host: 192.168.1.100
    port: 5432
    database: airline_report
    user: report_user
    password: ${POSTGRES_PASSWORD}
    pool_min: 2
    pool_max: 8
    timeout: 20
  
  # Doris 分析数据库
  doris_analytics:
    type: doris
    host: 192.168.1.200
    port: 9030
    database: airline_analytics
    user: analytics_user
    password: ${DORIS_PASSWORD}
    pool_size: 10
    timeout: 30
